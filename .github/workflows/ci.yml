name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build does not fail on env access.
          # Real secrets live in Vercel Environment Variables.
          NEXTAUTH_SECRET: ci-placeholder-secret-do-not-use-in-prod
          NEXTAUTH_URL: http://localhost:3000
